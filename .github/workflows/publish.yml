name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - ".github/workflows/publish.yml"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Check if version is already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view schema-viz@$PKG_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭ $PKG_VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🚀 Publishing $PKG_VERSION"
          fi

      - run: npm ci
        if: steps.version_check.outputs.skip == 'false'

      - name: Run fixture tests
        if: steps.version_check.outputs.skip == 'false'
        run: npm run test-fixtures

      - name: Publish
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --provenance --access public
